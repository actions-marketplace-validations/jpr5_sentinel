<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6666"/>
      <stop offset="100%" stop-color="#ff4444"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(255,68,68,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,68,68,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Subtle glow behind shield -->
  <ellipse cx="600" cy="240" rx="300" ry="200" fill="url(#glow)"/>

  <!-- Shield icon (scaled from favicon) -->
  <g transform="translate(540, 100) scale(1.875)">
    <path d="M32 4L8 18v16c0 14.4 10.24 27.84 24 31.2C45.76 61.84 56 48.4 56 34V18L32 4z"
          fill="url(#shield-grad)" stroke="#cc3636" stroke-width="2"/>
    <path d="M32 16l-14 8v10c0 8.4 5.98 16.24 14 18.2 8.02-1.96 14-9.8 14-18.2V24l-14-8z"
          fill="#0a0a0f" opacity="0.6"/>
    <path d="M28 34l-4-4-2 2 6 6 12-12-2-2-10 10z"
          fill="#ff4444"/>
  </g>

  <!-- Title -->
  <text x="600" y="370" text-anchor="middle"
        font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
        font-size="72" font-weight="700" fill="#e8e8f0"
        letter-spacing="-2">sentinel</text>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle"
        font-family="'Instrument Sans', -apple-system, system-ui, sans-serif"
        font-size="28" font-weight="500" fill="#8888a0">CI/CD Security Scanner</text>

  <!-- Tagline -->
  <text x="600" y="475" text-anchor="middle"
        font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
        font-size="20" font-weight="400" fill="#ff4444">28 rules · Auto-fix · AI-powered</text>

  <!-- Domain -->
  <text x="600" y="580" text-anchor="middle"
        font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
        font-size="16" font-weight="400" fill="#555570">sentinel.copilotkit.dev</text>
</svg>
