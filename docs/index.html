<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Redirect /index.html to clean URL -->
    <script>
      if (window.location.pathname.endsWith("/index.html")) {
        window.history.replaceState(null, "", "/");
      }
    </script>
    <title>sentinel — Deterministic security scanner for GitHub Actions workflows</title>
    <meta
      name="description"
      content="Deterministic pattern matching against 28 security dimensions. SHA pinning, shell injection, credential exposure, dangerous triggers — everything your workflows need auditing for."
    />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sentinel.copilotkit.dev/" />
    <meta property="og:title" content="sentinel — Deterministic security scanner for GitHub Actions workflows" />
    <meta
      property="og:description"
      content="28 security rules. Deterministic scanning, AI-powered fixes. Find CI vulnerabilities before attackers do."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="sentinel — Find CI vulnerabilities before attackers do" />
    <meta
      name="twitter:description"
      content="28 security rules with deterministic scanning and AI-powered remediation via Claude."
    />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ─── Reset & Variables ───────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #111118;
        --bg-card: #16161f;
        --bg-card-hover: #1c1c28;
        --border: #2a2a3a;
        --border-bright: #3a3a50;
        --text-primary: #e8e8f0;
        --text-secondary: #8888a0;
        --text-dim: #555570;
        --accent: #ff4444;
        --accent-dim: #cc3636;
        --accent-glow: rgba(255, 68, 68, 0.15);
        --accent-glow-strong: rgba(255, 68, 68, 0.3);
        --warning: #ffaa00;
        --error: #ff4466;
        --blue: #4488ff;
        --purple: #aa66ff;
        --cyan: #22d3ee;
        --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
        --font-features-mono: "liga" 0, "calt" 0;
        --font-sans: "Instrument Sans", -apple-system, system-ui, sans-serif;
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      }

      html {
        font-size: 16px;
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-sans);
        background: var(--bg-deep);
        color: var(--text-primary);
        line-height: 1.6;
        overflow-x: hidden;
      }

      code,
      pre,
      kbd {
        font-feature-settings: var(--font-features-mono);
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      /* ─── Noise Overlay ──────────────────────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
      }

      /* ─── Layout ─────────────────────────────────────────────────── */
      .container {
        max-width: 1120px;
        margin: 0 auto;
        padding: 0 2rem;
      }

      /* ─── Nav ────────────────────────────────────────────────────── */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 1rem 0;
        background: rgba(10, 10, 15, 0.85);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border-bottom: 1px solid var(--border);
      }
      nav .container {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .nav-brand {
        display: flex;
        flex-direction: column;
        gap: 0;
        font-family: var(--font-mono);
        font-weight: 600;
        font-size: 1rem;
        color: var(--text-primary);
      }
      .nav-brand .brand-main {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .nav-brand .prompt {
        color: var(--accent);
      }
      .nav-brand .powered-by {
        font-size: 0.6rem;
        font-weight: 400;
        color: var(--text-dim);
        padding-left: 1.5rem;
        margin-top: -2px;
      }
      .nav-brand .powered-by a {
        color: var(--text-dim);
        transition: color 0.2s;
      }
      .nav-brand .powered-by a:hover {
        color: var(--text-secondary);
        text-decoration: none;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 2rem;
        list-style: none;
      }
      .nav-links a {
        color: var(--text-secondary);
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: var(--text-primary);
        text-decoration: none;
      }
      .nav-links .gh-link {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 1rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .nav-links .gh-link:hover {
        border-color: var(--border-bright);
        background: var(--bg-card);
      }

      /* ─── Animations ─────────────────────────────────────────────── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .fade-in {
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 0.8s var(--ease-out-expo),
          transform 0.8s var(--ease-out-expo);
      }
      .fade-in.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* ─── Hero ───────────────────────────────────────────────────── */
      .hero {
        padding: 120px 0 3rem;
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        top: -200px;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 600px;
        background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
        pointer-events: none;
      }
      .hero .container {
        position: relative;
        z-index: 1;
      }
      .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 1rem;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 100px;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-secondary);
        margin-bottom: 2rem;
        animation: fadeUp 0.8s var(--ease-out-expo) both;
      }
      .hero-badge .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
        animation: pulse 2s infinite;
      }
      .hero h1 {
        font-family: var(--font-sans);
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        font-weight: 700;
        line-height: 1.08;
        letter-spacing: -0.03em;
        max-width: 780px;
        animation: fadeUp 0.8s var(--ease-out-expo) 0.1s both;
      }
      .hero h1 .highlight {
        color: var(--accent);
        position: relative;
      }
      .hero-sub {
        font-size: 1.2rem;
        color: var(--text-secondary);
        max-width: 640px;
        margin-top: 1.5rem;
        line-height: 1.7;
        animation: fadeUp 0.8s var(--ease-out-expo) 0.2s both;
      }

      /* ─── Install Box ────────────────────────────────────────────── */
      .install-box {
        display: inline-flex;
        align-items: center;
        gap: 1rem;
        margin-top: 2.5rem;
        padding: 0.75rem 1rem 0.75rem 1.25rem;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        animation: fadeUp 0.8s var(--ease-out-expo) 0.3s both;
      }
      .install-box .prompt-sign {
        color: var(--accent);
        user-select: none;
      }
      .install-box code {
        color: var(--text-primary);
      }
      .install-box .copy-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-secondary);
        padding: 0.35rem 0.75rem;
        font-family: var(--font-mono);
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .install-box .copy-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .install-box.install-box--multi {
        display: inline-flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0.25rem;
        padding: 0.75rem 1.25rem;
        max-width: 100%;
      }
      .install-box--multi .run-cmd {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .install-box--multi .run-cmd code {
        overflow-x: auto;
        flex: 1;
        white-space: nowrap;
      }
      .install-box--multi .run-or {
        color: var(--text-secondary);
        font-size: 0.75rem;
        text-align: center;
        padding: 0.25rem 0;
        user-select: none;
      }
      .install-secondary {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: var(--text-secondary);
        animation: fadeUp 0.8s var(--ease-out-expo) 0.35s both;
      }
      .install-secondary code {
        font-family: var(--font-mono);
        color: var(--text-primary);
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.15rem 0.45rem;
        font-size: 0.85em;
      }

      /* ─── Demo Panels ────────────────────────────────────────────── */
      .demo-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-top: 3.5rem;
        animation: fadeUp 0.8s var(--ease-out-expo) 0.4s both;
      }
      .demo-panel {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.4),
          0 2px 8px rgba(0, 0, 0, 0.2);
      }
      .demo-titlebar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        background: rgba(0, 0, 0, 0.3);
        border-bottom: 1px solid var(--border);
      }
      .demo-titlebar .dots {
        display: flex;
        gap: 6px;
      }
      .demo-titlebar .dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .demo-titlebar .dots span:nth-child(1) {
        background: #ff5f57;
      }
      .demo-titlebar .dots span:nth-child(2) {
        background: #ffbd2e;
      }
      .demo-titlebar .dots span:nth-child(3) {
        background: #28ca42;
      }
      .demo-titlebar .title {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-dim);
        margin-left: 0.5rem;
      }
      .demo-body {
        padding: 1.25rem;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        line-height: 1.7;
        overflow-x: auto;
      }

      /* ─── Syntax Highlighting ────────────────────────────────────── */
      .syn-key {
        color: #88aaff;
      }
      .syn-str {
        color: #66ddaa;
      }
      .syn-num {
        color: #ffaa66;
      }
      .syn-bool {
        color: #ff88aa;
      }
      .syn-bracket {
        color: var(--text-dim);
      }
      .syn-comment {
        color: var(--text-dim);
        font-style: italic;
      }

      /* ─── Terminal Colors ────────────────────────────────────────── */
      .t-green {
        color: var(--accent);
      }
      .t-yellow {
        color: var(--warning);
      }
      .t-red {
        color: var(--error);
      }
      .t-blue {
        color: var(--blue);
      }
      .t-dim {
        color: var(--text-dim);
      }
      .t-purple {
        color: var(--purple);
      }
      .t-cyan {
        color: var(--cyan);
      }

      /* ─── Terminal Demo Animation ────────────────────────────────── */
      .demo-term {
        padding: 1.25rem;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        line-height: 1.75;
        height: 380px;
        overflow: hidden;
      }
      .demo-term .line {
        opacity: 0;
        transform: translateX(-6px);
        white-space: nowrap;
      }
      .demo-term .line.visible {
        opacity: 1;
        transform: translateX(0);
        transition:
          opacity 0.25s ease,
          transform 0.25s ease;
      }
      .demo-term .prompt-sym {
        color: var(--accent);
        user-select: none;
      }
      .demo-term .cmd {
        color: var(--text-primary);
      }
      .demo-term .info {
        color: var(--text-dim);
      }
      .demo-term .ok {
        color: var(--accent);
      }
      .demo-term .req {
        color: var(--warning);
      }
      .demo-term .match {
        color: var(--purple);
      }
      .demo-term .cursor {
        display: inline-block;
        width: 7px;
        height: 14px;
        background: var(--accent);
        animation: blink 1s step-end infinite;
        vertical-align: text-bottom;
        margin-left: 1px;
      }

      /* ─── Section: Feature Grid ──────────────────────────────────── */
      .section-features {
        padding: 4.5rem 0;
        background: linear-gradient(
          180deg,
          var(--bg-deep) 0%,
          var(--bg-surface) 50%,
          var(--bg-deep) 100%
        );
      }
      .section-features h2 {
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        text-align: center;
        margin-bottom: 3.5rem;
      }
      .feature-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
      }
      .feature-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        transition: all 0.3s var(--ease-out-expo);
      }
      .feature-card:hover {
        transform: translateY(-4px);
        border-color: var(--border-bright);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      .feature-card .feature-icon {
        font-size: 1.75rem;
        margin-bottom: 1rem;
      }
      .feature-card h3 {
        font-size: 1.05rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .feature-card p {
        font-size: 0.875rem;
        color: var(--text-secondary);
        line-height: 1.6;
      }

      /* ─── Section: GitHub Action ───────────────────────────────────── */
      .section-action {
        padding: 4.5rem 0;
      }
      .section-action h2 {
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        text-align: center;
        margin-bottom: 3rem;
      }
      .action-panel-wrap {
        max-width: 700px;
        margin: 0 auto;
      }
      .action-description {
        max-width: 700px;
        margin: 1.5rem auto 0;
        text-align: center;
        color: var(--text-secondary);
        font-size: 1rem;
        line-height: 1.7;
      }

      /* ─── Section: Rules Table ───────────────────────────────────── */
      .section-rules {
        padding: 4.5rem 0;
        position: relative;
        background: linear-gradient(
          180deg,
          var(--bg-deep) 0%,
          #0d1220 30%,
          #0d1220 70%,
          var(--bg-deep) 100%
        );
      }
      .section-rules .container {
        position: relative;
        z-index: 1;
      }
      .section-rules h2 {
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        text-align: center;
        margin-bottom: 1rem;
      }
      .rules-sub {
        text-align: center;
        color: var(--text-secondary);
        font-size: 1.05rem;
        max-width: 640px;
        margin: 0 auto 3rem;
        line-height: 1.7;
      }
      .rules-wrap {
        -webkit-overflow-scrolling: touch;
        overflow-x: auto;
      }
      .rules-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 0.85rem;
      }
      .rules-table thead th {
        position: sticky;
        top: 57px;
        z-index: 10;
        padding: 0.75rem 1rem;
        background: var(--bg-deep);
        border-bottom: 1px solid var(--border);
        border-right: 1px solid var(--border);
        font-weight: 600;
        text-align: left;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-secondary);
        white-space: nowrap;
      }
      .rules-table thead th:first-child {
        text-align: center;
        width: 3rem;
      }
      .rules-table thead th:last-child {
        border-right: none;
      }
      .rules-table tbody td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        border-right: 1px solid var(--border);
        color: var(--text-secondary);
      }
      .rules-table tbody td:first-child {
        font-family: var(--font-mono);
        color: var(--text-dim);
        text-align: center;
        width: 3rem;
      }
      .rules-table tbody td:nth-child(2) {
        font-family: var(--font-mono);
        color: var(--text-primary);
        font-weight: 500;
        white-space: nowrap;
      }
      .rules-table tbody td:last-child {
        border-right: none;
      }
      .rules-table tbody tr:hover td {
        background: var(--bg-card-hover);
      }
      .sev-critical {
        color: var(--error);
        font-weight: 600;
        font-family: var(--font-mono);
        font-size: 0.8rem;
      }
      .sev-high {
        color: var(--warning);
        font-weight: 600;
        font-family: var(--font-mono);
        font-size: 0.8rem;
      }
      .sev-medium {
        color: var(--cyan);
        font-weight: 500;
        font-family: var(--font-mono);
        font-size: 0.8rem;
      }
      .sev-low {
        color: var(--text-dim);
        font-weight: 500;
        font-family: var(--font-mono);
        font-size: 0.8rem;
      }

      /* ─── Section: Quick Start ───────────────────────────────────── */
      .section-quickstart {
        padding: 4.5rem 0;
      }
      .section-quickstart h2 {
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        text-align: center;
        margin-bottom: 3.5rem;
      }
      .quickstart-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
        max-width: 100%;
      }
      .quickstart-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.75rem;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        min-width: 0;
      }
      .quickstart-card h3 {
        font-size: 0.95rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--text-primary);
      }
      .quickstart-card pre {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        line-height: 1.7;
        color: var(--text-secondary);
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1rem;
        overflow-x: auto;
      }
      .quickstart-card pre .prompt-sign {
        color: var(--accent);
        user-select: none;
      }
      .quickstart-card pre .cmd-text {
        color: var(--text-primary);
      }
      .quickstart-card pre .comment-text {
        color: var(--text-dim);
        font-style: italic;
      }

      /* ─── Section: Coming Soon ─────────────────────────────────── */
