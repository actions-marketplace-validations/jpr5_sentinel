<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200" />
    <title>sentinel OG Image</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Radial glow behind the shield */
      .glow {
        position: absolute;
        top: 60px;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 400px;
        background: radial-gradient(ellipse, rgba(255,68,68,0.15) 0%, transparent 70%);
        pointer-events: none;
      }

      .shield {
        position: relative;
        z-index: 1;
        width: 120px;
        height: 120px;
        margin-bottom: 32px;
      }

      .title {
        position: relative;
        z-index: 1;
        font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        font-size: 72px;
        font-weight: 700;
        color: #e8e8f0;
        letter-spacing: -2px;
        margin-bottom: 12px;
      }

      .subtitle {
        position: relative;
        z-index: 1;
        font-family: 'Instrument Sans', -apple-system, system-ui, sans-serif;
        font-size: 28px;
        font-weight: 500;
        color: #8888a0;
        margin-bottom: 24px;
      }

      .tagline {
        position: relative;
        z-index: 1;
        font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        font-size: 20px;
        font-weight: 400;
        color: #ff4444;
        margin-bottom: 48px;
      }

      .domain {
        position: absolute;
        bottom: 40px;
        z-index: 1;
        font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        font-size: 16px;
        font-weight: 400;
        color: #555570;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>

    <svg class="shield" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff6666"/>
          <stop offset="100%" stop-color="#ff4444"/>
        </linearGradient>
      </defs>
      <path d="M32 4L8 18v16c0 14.4 10.24 27.84 24 31.2C45.76 61.84 56 48.4 56 34V18L32 4z"
            fill="url(#g)" stroke="#cc3636" stroke-width="2"/>
      <path d="M32 16l-14 8v10c0 8.4 5.98 16.24 14 18.2 8.02-1.96 14-9.8 14-18.2V24l-14-8z"
            fill="#0a0a0f" opacity="0.6"/>
      <path d="M28 34l-4-4-2 2 6 6 12-12-2-2-10 10z"
            fill="#ff4444"/>
    </svg>

    <div class="title">sentinel</div>
    <div class="subtitle">CI/CD Security Scanner</div>
    <div class="tagline">28 rules &middot; Auto-fix &middot; AI-powered</div>
    <div class="domain">sentinel.copilotkit.dev</div>
  </body>
</html>
