name: Deploy Bot
on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - 'lib/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  RAILWAY_ENV_ID: "7dafda2c-aa94-453b-af8c-06cef87895a9"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: sentinel-bot
            image: sentinel-bot
            dockerfile: bot/Dockerfile
            railway_id: "e66e43f7-9a07-4a60-908f-096e6b7bfbf1"
          - name: sentinel-web
            image: sentinel-web
            dockerfile: bot/Dockerfile.web
            railway_id: "68aa0cee-5100-4ced-82d6-f11feb53140d"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/jpr5/${{ matrix.service.image }}:latest
            ghcr.io/jpr5/${{ matrix.service.image }}:${{ github.sha }}

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ matrix.service.railway_id }}
          ENV_ID: ${{ env.RAILWAY_ENV_ID }}
          PROJECT_ID: "570b2f3f-69dd-4f55-999a-9c72ecec00b1"
        run: |
          # Update the image reference so Railway knows which tag to pull.
          IMAGE="ghcr.io/jpr5/${{ matrix.service.image }}:${{ github.sha }}"
          RESULT=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceUpdate(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\", input: { source: { image: \\\"$IMAGE\\\" } }) }\"}")
          ERRORS=$(echo "$RESULT" | jq -r '.errors[]?.message // empty')
          if [ -n "$ERRORS" ]; then
            echo "::error::Railway image update failed: $ERRORS"
            exit 1
          fi

          # Env var change forces Railway to re-pull the image and start a fresh container.
          RESULT=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { variableCollectionUpsert(input: { projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENV_ID\\\", serviceId: \\\"$SERVICE_ID\\\", variables: { DEPLOY_SHA: \\\"${{ github.sha }}\\\" } }) }\"}")
          ERRORS=$(echo "$RESULT" | jq -r '.errors[]?.message // empty')
          if [ -n "$ERRORS" ]; then
            echo "::error::Railway deploy trigger failed: $ERRORS"
            exit 1
          fi
          echo "Deploy triggered for ${{ matrix.service.name }} (image: $IMAGE)"

      - name: Verify deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ matrix.service.railway_id }}
          ENV_ID: ${{ env.RAILWAY_ENV_ID }}
        run: |
          for i in $(seq 1 18); do
            RESULT=$(curl -s -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"query { deployments(first: 1, input: { serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\" }) { edges { node { status } } } }\"}" \
              https://backboard.railway.com/graphql/v2 2>/dev/null)
            STATUS=$(echo "$RESULT" | jq -r '.data.deployments.edges[0].node.status')
            echo "Attempt $i: status=$STATUS"

            case "$STATUS" in
              CRASHED|FAILED|REMOVED)
                echo "::error::${{ matrix.service.name }} deploy failed: $STATUS"
                exit 1
                ;;
              SUCCESS)
                echo "${{ matrix.service.name }} deployed successfully"
                exit 0
                ;;
            esac
            sleep 10
          done
          echo "::warning::${{ matrix.service.name }} did not reach SUCCESS within 180s"
