name: Deploy Bot
on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - 'lib/**'
      - 'bot/Dockerfile'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | sh

      - name: Deploy bot to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_BOT_TOKEN }}
        run: |
          cd bot
          railway up --service sentinel-bot --detach
