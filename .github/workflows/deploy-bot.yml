name: Deploy Bot
on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - 'lib/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  RAILWAY_ENV_ID: "0ee31ecd-3d59-4791-a04a-3f106d82cd85"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: sentinel-bot
            image: sentinel-bot
            dockerfile: bot/Dockerfile
            railway_id: "d3dc2005-752e-49ce-b8dc-25f492f4ac22"
          - name: sentinel-web
            image: sentinel-web
            dockerfile: bot/Dockerfile.web
            railway_id: "7c3c2d5a-3ff5-4e15-b657-9803ac320f18"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ghcr.io/jpr5/${{ matrix.service.image }}:latest
            ghcr.io/jpr5/${{ matrix.service.image }}:${{ github.sha }}

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ matrix.service.railway_id }}
          ENV_ID: ${{ env.RAILWAY_ENV_ID }}
          PROJECT_ID: "60cc49ff-cdbb-4c5b-9c55-6b3d2391f93d"
        run: |
          # Env var change triggers a fresh deploy that re-pulls the image.
          # serviceInstanceRedeploy does NOT re-pull — it reuses cached image.
          DEPLOY_SHA="${{ github.sha }}"
          RESULT=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { variableCollectionUpsert(input: { projectId: \\\"$PROJECT_ID\\\", environmentId: \\\"$ENV_ID\\\", serviceId: \\\"$SERVICE_ID\\\", variables: { DEPLOY_SHA: \\\"$DEPLOY_SHA\\\" } }) }\"}")
          ERRORS=$(echo "$RESULT" | jq -r '.errors[]?.message // empty')
          if [ -n "$ERRORS" ]; then
            echo "::error::Railway deploy trigger failed: $ERRORS"
            exit 1
          fi
          echo "Deploy triggered for ${{ matrix.service.name }} (sha: $DEPLOY_SHA)"

      - name: Verify deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ matrix.service.railway_id }}
          ENV_ID: ${{ env.RAILWAY_ENV_ID }}
        run: |
          for i in $(seq 1 18); do
            RESULT=$(curl -s -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"query { deployments(first: 1, input: { serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\" }) { edges { node { status } } } }\"}" \
              https://backboard.railway.com/graphql/v2 2>/dev/null)
            STATUS=$(echo "$RESULT" | jq -r '.data.deployments.edges[0].node.status')
            echo "Attempt $i: status=$STATUS"

            case "$STATUS" in
              CRASHED|FAILED|REMOVED)
                echo "::error::${{ matrix.service.name }} deploy failed: $STATUS"
                exit 1
                ;;
              SUCCESS)
                echo "${{ matrix.service.name }} deployed successfully"
                exit 0
                ;;
            esac
            sleep 10
          done
          echo "::warning::${{ matrix.service.name }} did not reach SUCCESS within 180s"
