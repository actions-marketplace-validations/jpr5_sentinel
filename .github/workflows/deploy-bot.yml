name: Deploy Bot
on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - 'lib/**'
      - 'bot/Dockerfile'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: railway
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy bot to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_BOT_TOKEN }}
        run: |
          cd bot
          railway up --service sentinel-bot --detach
