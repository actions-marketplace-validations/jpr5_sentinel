name: Scanner Bot
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      pattern:
        description: 'Vulnerability pattern'
        type: choice
        options:
          - rotate
          - shell-injection
          - shell-injection-body
          - shell-injection-headref
          - shell-injection-actor
          - dangerous-triggers
      dry-run:
        description: 'Dry run'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@a4effe49ee0ee5672cfb0b75a307434087a3183d # v1.210.0
        with:
          ruby-version: '3.3'
      - name: Run bot
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          PATTERN: ${{ inputs.pattern || 'rotate' }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          args="--pattern $PATTERN"
          if [ "$DRY_RUN" = "true" ]; then args="$args --dry-run"; fi
          ruby bot/scanner_bot.rb $args
