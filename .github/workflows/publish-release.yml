name: Release
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1
        with:
          ruby-version: '3.3'

      - name: Check if version is already published
        id: check
        run: |
          VERSION=$(ruby -e 'require_relative "lib/version"; puts Sentinel::VERSION')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if curl -s "https://rubygems.org/api/v1/versions/sentinel-ci.json" | ruby -rjson -e 'exit(JSON.parse(STDIN.read).any? { |v| v["number"] == ARGV[0] } ? 0 : 1)' "${VERSION}"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check changelog has entry for version
        if: steps.check.outputs.published == 'false'
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          if ! grep -q "## ${VERSION}" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md has no entry for version ${VERSION}"
            echo "Add a '## ${VERSION}' section before releasing."
            exit 1
          fi

      - name: Run tests
        if: steps.check.outputs.published == 'false'
        run: rake test

      - name: Build gem
        if: steps.check.outputs.published == 'false'
        run: gem build sentinel-ci.gemspec

      - name: Upload gem
        if: steps.check.outputs.published == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gem
          path: sentinel-ci-*.gem
          retention-days: 1

    outputs:
      version: ${{ steps.check.outputs.version }}
      published: ${{ steps.check.outputs.published }}

  publish:
    needs: build
    if: needs.build.outputs.published == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: rubygems
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git credentials
        run: |
          git config --local url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Download gem
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: gem

      - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1
        with:
          ruby-version: '3.3'

      - name: Publish to RubyGems (trusted publishing)
        run: |
          gem exec rubygems-oidc-action --sign-in
          gem push sentinel-ci-*.gem


      - name: Create git tag
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Update major version tag
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          MAJOR="v$(echo "${VERSION}" | cut -d. -f1)"
          git tag -f "${MAJOR}"
          git push origin "${MAJOR}" --force

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          TAG="v${VERSION}"
          gh release create "${TAG}" \
            sentinel-ci-*.gem \
            --generate-notes \
            --title "${TAG}" \
            --verify-tag \
            --latest

    outputs:
      version: ${{ needs.build.outputs.version }}
