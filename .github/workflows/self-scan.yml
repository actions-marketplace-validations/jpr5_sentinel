name: Self Scan
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./
        with:
          severity: medium
          fail-on-findings: false
          # fix: true          # Enable to auto-fix findings
          # ai-fix: true       # Enable AI fixes (requires ai-key)
          # ai-key: ${{ secrets.ANTHROPIC_API_KEY }}
