name: Self Scan
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./
        with:
          severity: medium
          fail-on-findings: false
          # fix: true          # Enable to auto-fix findings
          # ai-fix: true       # Enable AI fixes (requires ai-key)
          # ai-key: ${{ secrets.ANTHROPIC_API_KEY }}
