name: 'Workflow Security Scanner'
description: 'Scan GitHub Actions workflows for 21 security vulnerabilities. No AI -- deterministic pattern matching.'
author: 'jpr5'

inputs:
  severity:
    description: 'Minimum severity: critical, high, medium, low'
    required: false
    default: 'high'
  fail-on-findings:
    description: 'Fail the check if findings above threshold exist'
    required: false
    default: 'true'
  fix:
    description: 'Auto-fix findings (mechanical fixes for 6 rules)'
    required: false
    default: 'false'
  ai-fix:
    description: 'Also use AI-powered fixes for complex rules (requires ai-key)'
    required: false
    default: 'false'
  ai-key:
    description: 'Anthropic API key for AI-powered fixes'
    required: false
    default: ''

outputs:
  findings-count:
    description: 'Total findings at or above severity'
  critical-count:
    description: 'Critical findings count'
  high-count:
    description: 'High findings count'
  fixes-applied:
    description: 'Number of findings auto-fixed'

runs:
  using: 'docker'
  image: 'Dockerfile'

branding:
  icon: 'shield'
  color: 'red'
