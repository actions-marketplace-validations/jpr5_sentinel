name: 'Workflow Security Scanner'
description: 'Scan GitHub Actions workflows for 32 security vulnerabilities -- deterministic pattern matching.'
author: 'jpr5'

inputs:
  severity:
    description: 'Minimum severity: critical, high, medium, low'
    required: false
    default: 'high'
  fail-on-findings:
    description: 'Fail the check if findings above threshold exist'
    required: false
    default: 'true'
  fix:
    description: 'Auto-fix findings. Mechanical only by default. Add anthropic-key for AI-powered fixes.'
    required: false
    default: 'false'
  anthropic-key:
    description: 'Anthropic API key — enables AI-powered fixes for all 32 rules when fix is true'
    required: false
    default: ''

outputs:
  findings-count:
    description: 'Total findings at or above severity'
  critical-count:
    description: 'Critical findings count'
  high-count:
    description: 'High findings count'
  fixes-applied:
    description: 'Number of findings auto-fixed'

runs:
  using: 'docker'
  image: 'Dockerfile'

branding:
  icon: 'shield'
  color: 'red'
